name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: "ci-auth-secret"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/ai_memo?schema=public"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/ai_memo?schema=public"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate
        run: npm run validate
